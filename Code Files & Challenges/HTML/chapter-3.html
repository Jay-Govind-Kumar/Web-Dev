<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lists</title>
</head>

<body>
    <!-- This is an unordered list -->
    <ul>
        <li>Momos</li>
        <li>Ice-Cream</li>
        <li>Pani-Puri</li>
    </ul>

    <!-- This is an ordered list -->
    <ol>
        <li>Brush the teeth</li>
        <li>Wash the face</li>
        <li>Comb the hair</li>
    </ol>

    <!-- Nested List -->
    <ul>
        <li>Cold Beverages
            <ul>
                <li>Cold Coffee</li>
                <li>Lassi</li>
                <li>Milk Shake</li>
            </ul>
        </li>

        <li>Hot Beverages
            <ul>
                <li>Tea</li>
                <li>Coffee</li>
                <li>Milk</li>
            </ul>
        </li>
    </ul>

    <!-- Description List -->
    <dl>
        <dt>HTML</dt>
        <dd>Hyper Text Markup Language</dd>
        <dt>CSS</dt>
        <dd>Cascading Style Sheets</dd>
        <dt>JS</dt>
        <dd>JavaScript</dd>
    </dl>
</body>

</html>
